version: 2
registries:
  files:
    type: python-index
    url: https://files.astralhosted.com
    username: __token__
    password: ${{ secrets.PYX_TOKEN }}
  zoo-pyx:
    type: python-index
    url: https://api.pyx.dev/simple/zoo/main
    username: __token__
    password: ${{ secrets.PYX_TOKEN }}
updates:
- package-ecosystem: github-actions
  directory: /
  schedule:
    interval: weekly
    day: saturday
    timezone: America/Los_Angeles
  open-pull-requests-limit: 5
  groups:
    security:
      applies-to: security-updates
      exclude-patterns:
      - kittycad*
      update-types:
      - minor
      - patch
    security-major:
      applies-to: security-updates
      exclude-patterns:
      - kittycad*
      update-types:
      - major
    patch:
      applies-to: version-updates
      exclude-patterns:
      - kittycad*
      update-types:
      - patch
    major:
      applies-to: version-updates
      exclude-patterns:
      - kittycad*
      update-types:
      - major
    minor:
      applies-to: version-updates
      exclude-patterns:
      - kittycad*
      update-types:
      - minor
      - patch
  cooldown:
    default-days: 7
    exclude:
    - '*kcl*'
    - '*zoo*'
    - '*kittycad*'
